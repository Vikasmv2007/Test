<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }

        .display {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 32px;
            min-height: 60px;
            word-wrap: break-word;
            word-break: break-all;
            color: #333;
            border: 2px solid #667eea;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: white;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(-1px);
        }

        .number, .operator {
            background: #667eea;
        }

        .number:hover, .operator:hover {
            background: #5568d3;
        }

        .equals {
            background: #48bb78;
            grid-column: span 2;
        }

        .equals:hover {
            background: #38a169;
        }

        .clear {
            background: #f56565;
            grid-column: span 2;
        }

        .clear:hover {
            background: #e53e3e;
        }

        .delete {
            background: #ed8936;
        }

        .delete:hover {
            background: #dd6b20;
        }

        .scientific-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .sci-btn {
            background: #9f7aea;
            padding: 12px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .sci-btn:hover {
            background: #805ad5;
            transform: translateY(-2px);
        }

        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: #2b6cb0;
        }

        .mode-btn:hover {
            background: #3182ce;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Calculator</h1>
        
        <div class="mode-buttons">
            <button class="mode-btn active" onclick="switchMode('basic')">Basic</button>
            <button class="mode-btn" onclick="switchMode('scientific')">Scientific</button>
        </div>

        <div class="display" id="display">0</div>

        <!-- Basic Mode -->
        <div id="basic-mode">
            <div class="buttons">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button class="delete" onclick="deleteLast()">DEL</button>
                <button class="operator" onclick="appendOperator('/')">÷</button>
                <button class="operator" onclick="appendOperator('*')">×</button>

                <button class="number" onclick="appendNumber('7')">7</button>
                <button class="number" onclick="appendNumber('8')">8</button>
                <button class="number" onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('-')">-</button>

                <button class="number" onclick="appendNumber('4')">4</button>
                <button class="number" onclick="appendNumber('5')">5</button>
                <button class="number" onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('+')">+</button>

                <button class="number" onclick="appendNumber('1')">1</button>
                <button class="number" onclick="appendNumber('2')">2</button>
                <button class="number" onclick="appendNumber('3')">3</button>
                <button class="operator" onclick="appendOperator('%')">%</button>

                <button class="number" onclick="appendNumber('0')">0</button>
                <button class="number" onclick="appendNumber('.')">.</button>
                <button class="equals" onclick="calculate()">=</button>
            </div>
        </div>

        <!-- Scientific Mode -->
        <div id="scientific-mode" class="hidden">
            <div class="scientific-buttons">
                <button class="sci-btn" onclick="scientificOperation('sqrt')">√</button>
                <button class="sci-btn" onclick="scientificOperation('sin')">sin</button>
                <button class="sci-btn" onclick="scientificOperation('cos')">cos</button>
                <button class="sci-btn" onclick="scientificOperation('tan')">tan</button>
                <button class="sci-btn" onclick="scientificOperation('log')">log</button>
                <button class="sci-btn" onclick="scientificOperation('ln')">ln</button>
                <button class="sci-btn" onclick="scientificOperation('exp')">e^x</button>
                <button class="sci-btn" onclick="scientificOperation('factorial')">x!</button>
                <button class="sci-btn" onclick="scientificOperation('power')">x^y</button>
            </div>
            <div class="buttons">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button class="delete" onclick="deleteLast()">DEL</button>
                <button class="operator" onclick="appendOperator('/')">÷</button>
                <button class="operator" onclick="appendOperator('*')">×</button>

                <button class="number" onclick="appendNumber('7')">7</button>
                <button class="number" onclick="appendNumber('8')">8</button>
                <button class="number" onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('-')">-</button>

                <button class="number" onclick="appendNumber('4')">4</button>
                <button class="number" onclick="appendNumber('5')">5</button>
                <button class="number" onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('+')">+</button>

                <button class="number" onclick="appendNumber('1')">1</button>
                <button class="number" onclick="appendNumber('2')">2</button>
                <button class="number" onclick="appendNumber('3')">3</button>
                <button class="operator" onclick="appendOperator('(')">( </button>

                <button class="number" onclick="appendNumber('0')">0</button>
                <button class="number" onclick="appendNumber('.')">.</button>
                <button class="equals" onclick="calculate()">=</button>
                <button class="operator" onclick="appendOperator(')')">)</button>
            </div>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetDisplay = false;

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentInput = num;
                shouldResetDisplay = false;
            } else {
                if (currentInput === '0' && num !== '.') {
                    currentInput = num;
                } else if (num === '.' && currentInput.includes('.')) {
                    return;
                } else {
                    currentInput += num;
                }
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== null && !shouldResetDisplay) {
                calculate();
            }
            previousInput = currentInput;
            operator = op;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function calculate() {
            if (operator === null || shouldResetDisplay) return;

            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = current !== 0 ? prev / current : 'Error';
                    break;
                case '%':
                    result = prev % current;
                    break;
                default:
                    return;
            }

            currentInput = String(result);
            operator = null;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function scientificOperation(op) {
            const num = parseFloat(currentInput);
            let result;

            switch (op) {
                case 'sqrt':
                    result = Math.sqrt(num);
                    break;
                case 'sin':
                    result = Math.sin(num * Math.PI / 180);
                    break;
                case 'cos':
                    result = Math.cos(num * Math.PI / 180);
                    break;
                case 'tan':
                    result = Math.tan(num * Math.PI / 180);
                    break;
                case 'log':
                    result = Math.log10(num);
                    break;
                case 'ln':
                    result = Math.log(num);
                    break;
                case 'exp':
                    result = Math.exp(num);
                    break;
                case 'factorial':
                    result = factorial(Math.floor(num));
                    break;
                case 'power':
                    appendOperator('^');
                    return;
                default:
                    return;
            }

            currentInput = String(result);
            shouldResetDisplay = true;
            updateDisplay();
        }

        function factorial(n) {
            if (n < 0) return 'Error';
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }

        function clearDisplay() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function switchMode(mode) {
            document.getElementById('basic-mode').classList.toggle('hidden', mode !== 'basic');
            document.getElementById('scientific-mode').classList.toggle('hidden', mode !== 'scientific');
            
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            clearDisplay();
        }

        // Keyboard support
        document.addEventListener('keydown', function(event) {
            if (event.key >= '0' && event.key <= '9') appendNumber(event.key);
            if (event.key === '.') appendNumber('.');
            if (event.key === '+' || event.key === '-' || event.key === '*' || event.key === '/') appendOperator(event.key);
            if (event.key === 'Enter') calculate();
            if (event.key === 'Backspace') deleteLast();
            if (event.key === 'Escape') clearDisplay();
        });
    </script>
</body>
</html>
